<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ronok</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #fff; touch-action: none; }
  canvas { display: block; touch-action: none; }
  #hint {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-family: "Comic Sans MS", "Chalkboard SE", sans-serif;
    color: #d4d4d4; font-size: 22px; user-select: none; cursor: pointer;
    transition: opacity 0.6s;
  }
</style>
</head>
<body>
<div id="hint">press space (and sound on)</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const hint = document.getElementById("hint");

let W = 0, H = 0;
function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", resize);
resize();

// ---------- character sprites: walk cycle + sitting + face-planted ----------
// two sets: clean-shaven ("") and mustachioed ("m" prefix); space alternates
const V = "?v=7";
function loadImg(f) {
  const img = new Image();
  img.src = "sprites/" + f + V;
  return img;
}
function loadSet(p) {
  return {
    walk: [0, 1, 2, 3, 4].map((i) => loadImg(p + "walk" + i + ".png")),
    sit: loadImg(p + "sit.png"),
    sitOpen: loadImg(p + "sit_open.png"),
    plant: loadImg(p + "plant.png"),
  };
}
const SPRITES = [loadSet(""), loadSet("m")];
let spawnCount = 0;

// ---------- clickable text lines, each with a voice clip + mouth timeline ----------
// voices[0] = clean-shaven guy, voices[1] = mustache guy
// mouth: open/closed per 1/25s of the clip, generated by tools/mouth_envelope.py
const MOUTH_FPS = 25;
const voice = (file, mouth) => ({ audio: new Audio("audio/" + file), mouth });
const LINES = [
  {
    text: "Ronok Tanvir",
    style: "600",
    px: 74,
    family: "Helvetica, Arial, sans-serif",
    color: "#1a1a1a",
    dy: -45,
    ascent: 60,
    height: 76,
    voices: [
      voice("hello.mp3", "000011101110111011101110111000111011101110000000000000000000111010011101100110000000"),
      voice("hello_m.mp3", "00011101100000001110111010001011101110111000000"),
    ],
    rect: null,
  },
  {
    text: "(reinforcement learning enthusiast)",
    style: "italic",
    px: 22,
    family: "Georgia, Palatino, serif",
    color: "#555",
    dy: -10,
    ascent: 19,
    height: 27,
    voices: [
      voice("rl.mp3", "0000011101100000000000000000000111011100011101001110000111011101110100011101110111000000000000000000000111011101110000000000000111001110000010000000"),
      voice("rl_m.mp3", "0111011100000000000000001110111011101011101011101110111011100111011101110100000"),
    ],
    rect: null,
  },
  {
    text: "computer & data science @ berkeley",
    style: "500",
    px: 24,
    family: "Avenir Next, Futura, Helvetica, sans-serif",
    color: "#2d5da8",
    dy: 35,
    ascent: 20,
    height: 30,
    voices: [
      voice("berkeley.mp3", "0001110011101110111011101100000111011101110111011101110111011100001110111011101110011101001110100111011101110111001110000000"),
      voice("berkeley_m.mp3", "011101110111011101110011100111011100001110111011101110111011100111000111010000"),
    ],
    rect: null,
  },
  {
    text: "currently MLE intern @ halluminate",
    style: "500",
    px: 24,
    family: "Avenir Next, Futura, Helvetica, sans-serif",
    color: "#3d3bc3",
    dy: 69,
    ascent: 20,
    height: 30,
    voices: [
      voice("mle.mp3", "010111011101110111011101110011101110111011101110001110111011101000000000"),
      voice("mle_m.mp3", "011101110110111000111011101110110111011101110111011101110111011101110111011101110111011101110111000000"),
    ],
    link: { word: "halluminate", url: "https://www.halluminate.ai/" },
    linkRect: null,
    rect: null,
  },
  {
    text: "previously researcher @ CAHL labs",
    style: "500",
    px: 24,
    family: "Avenir Next, Futura, Helvetica, sans-serif",
    color: "#fdb515",
    dy: 103,
    ascent: 20,
    height: 30,
    voices: [
      voice("cahl.mp3", "000011101110111011101110111011101110110111011101110111011101110111011101110011100000"),
      voice("cahl_m.mp3", "011101110111011101110011101110111011101110110011101110111011101110111011100000"),
    ],
    rect: null,
  },
];
// toss reactions: [0] "HEY!!!!!! ouch! ... [embarrassed]", [1] "oh dear... Ow! [sigh] jeez."
const THROWN = [
  voice("thrown.mp3", "000011101110111000000000000000000000000000001110111000111000000000000000000000000111011101110111000111000111011000000000"),
  voice("thrown_m.mp3", "00111011101110000000000000000001110111011000000000000000000001110000000000000111011101100000"),
];

let talking = null; // the voice currently being read aloud
for (const v of [...LINES.flatMap((l) => l.voices), ...THROWN])
  v.audio.addEventListener("ended", () => (talking = null));
const mouthOpen = () =>
  talking.mouth[Math.min(Math.floor(talking.audio.currentTime * MOUTH_FPS), talking.mouth.length - 1)] === "1";

const SPEAKER_CURSOR =
  'url("data:image/svg+xml,' +
  encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><text y="26" font-size="26">\u{1F50A}</text></svg>') +
  '") 8 8, pointer';
const inRect = (r, x, y) => r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;

// ---------- character state ----------
// (x, y) is where the feet touch the "ground"; z is height above it.
let guy = null;
let marker = null;      // {x, y} right-click destination arrow
let pendingTalk = null; // {x, y} text he's walking toward to read

function spawnGuy() {
  const fromLeft = Math.random() < 0.5;
  const startX = fromLeft ? -80 : W + 80;
  const startY = H * (0.3 + Math.random() * 0.4);
  const stache = spawnCount++ % 2 === 1;
  guy = {
    sprites: SPRITES[stache ? 1 : 0],
    stache,
    x: startX,
    y: startY,
    startX,
    startY,
    z: 0,
    homeX: W / 2,
    homeY: H / 2,
    t: 0,               // flight progress 0..1
    state: "thrown",    // thrown -> bounce -> idle | walk
    spin: 0,
    spinSpeed: (fromLeft ? 1 : -1) * (9 + Math.random() * 5),
    vz: 0,
    squash: 0,
    facing: 1,
    walkPhase: 0,
    idleT: 0,
    target: null,
  };
  marker = null;
  hint.style.opacity = 0;
  hint.style.pointerEvents = "none"; // once summoned, the hint is just a ghost
  stopTalking();
  talking = THROWN[stache ? 1 : 0];
  talking.audio.currentTime = 0;
  talking.audio.play();
}

const GRAVITY = 1600;
const WALK_SPEED = 320;

function update(dt) {
  if (!guy) return;

  if (guy.state === "thrown") {
    guy.t += dt / 0.9;
    const t = Math.min(guy.t, 1);
    guy.x = lerp(guy.startX, guy.homeX, t);
    guy.y = lerp(guy.startY, guy.homeY, t);
    guy.z = Math.sin(Math.PI * t) * 180;
    guy.spin += guy.spinSpeed * dt;
    if (guy.t >= 1) {
      guy.state = "bounce";
      guy.z = 0;
      guy.vz = 380;
      guy.squash = 1;
    }
  } else if (guy.state === "bounce") {
    guy.z += guy.vz * dt;
    guy.vz -= GRAVITY * dt;
    guy.spin += guy.spinSpeed * dt;
    guy.spinSpeed *= Math.pow(0.2, dt);
    if (guy.z <= 0) {
      guy.z = 0;
      guy.vz = -guy.vz * 0.45;
      guy.squash = 1;
      if (guy.vz < 80) {
        guy.state = "planted"; // lie face-down for a beat after the crash
        guy.plantT = 0.9;
        guy.spin = 0;
      }
    }
  } else if (guy.state === "planted") {
    guy.plantT -= dt;
    if (guy.plantT <= 0) guy.state = "idle";
  } else {
    // idle or walk: arrow keys take priority over a click target
    const kx = (keys.has("ArrowRight") ? 1 : 0) - (keys.has("ArrowLeft") ? 1 : 0);
    const ky = (keys.has("ArrowDown") ? 1 : 0) - (keys.has("ArrowUp") ? 1 : 0);
    const step = WALK_SPEED * dt;
    if (pendingTalk && !kx && !ky) {
      if (Math.hypot(pendingTalk.x - guy.x, pendingTalk.y - guy.y) <= TALK_RANGE) {
        const spot = pendingTalk;
        pendingTalk = null;
        startTalking(spot);
      } else if (!guy.target) {
        guy.target = pendingTalk; // head toward the text he wants to read
      }
    }
    if (kx || ky) {
      stopTalking();
      guy.target = null;
      marker = null;
      const inv = 1 / Math.hypot(kx, ky);
      guy.x = Math.min(Math.max(guy.x + kx * inv * step, 20), W - 20);
      guy.y = Math.min(Math.max(guy.y + ky * inv * step, 20), H - 10);
      if (kx) guy.facing = kx;
      guy.walkPhase += dt * 12;
      guy.state = "walk";
    } else if (guy.target) {
      const dx = guy.target.x - guy.x;
      const dy = guy.target.y - guy.y;
      const dist = Math.hypot(dx, dy);
      if (Math.abs(dx) > 2) guy.facing = dx > 0 ? 1 : -1;
      guy.walkPhase += dt * 12;
      guy.state = "walk";
      if (dist <= step) {
        guy.x = guy.target.x;
        guy.y = guy.target.y;
        guy.target = null;
        guy.state = "idle";
        guy.squash = 0.6;
        marker = null;
      } else {
        guy.x += (dx / dist) * step;
        guy.y += (dy / dist) * step;
      }
    } else {
      guy.state = "idle";
    }
  }

  guy.squash = Math.max(0, guy.squash - dt * 5);
  guy.idleT = guy.state === "idle" ? guy.idleT + dt : 0;
}

const lerp = (a, b, t) => a + (b - a) * t;

// ---------- drawing ----------
function drawGuy(g, time) {
  const airborne = g.state === "thrown" || g.state === "bounce";
  const SCALE = 0.75;  // sprite native px -> screen px
  const CENTER = 42;   // spin pivot height above the feet

  // shadow on the ground
  const shadowScale = Math.max(0.3, 1 - g.z / 250);
  ctx.fillStyle = "rgba(0,0,0,0.12)";
  ctx.beginPath();
  ctx.ellipse(g.x, g.y, 34 * shadowScale, 11 * shadowScale, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.save();
  ctx.translate(g.x, g.y - g.z - CENTER);
  if (airborne) ctx.rotate(g.spin);
  ctx.scale(g.facing, 1);
  const sq = 1 + g.squash * 0.35;
  ctx.scale(sq, 1 / sq);
  ctx.translate(0, CENTER); // feet at y=0 from here

  const S = g.sprites;
  let img;
  if (g.state === "planted") img = S.plant;
  else if (airborne) img = S.walk[4]; // tumbling kissy-face while flying
  else if (g.state === "walk") img = S.walk[Math.floor(g.walkPhase) % S.walk.length];
  else if (g.idleT < 0.5) img = S.walk[0]; // stand for a moment before sitting
  else if (talking) img = mouthOpen() ? S.sitOpen : S.sit; // mouth follows the audio
  else img = S.sit;
  if (img.complete && img.naturalWidth > 0) {
    const w = img.naturalWidth * SCALE;
    const h = img.naturalHeight * SCALE;
    ctx.drawImage(img, -w / 2, -h, w, h);
  }

  ctx.restore();
}

function drawMarker(m, time) {
  // pulsing ground ring
  const pulse = (time * 1.6) % 1;
  ctx.strokeStyle = "rgba(53,201,74," + (1 - pulse) * 0.8 + ")";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(m.x, m.y, 10 + pulse * 22, (10 + pulse * 22) * 0.4, 0, 0, Math.PI * 2);
  ctx.stroke();

  // spinning fake-3D arrow pointing down at the spot
  const spin = Math.cos(time * 5);
  const bob = Math.sin(time * 6) * 6;
  ctx.save();
  ctx.translate(m.x, m.y - 58 + bob);
  ctx.scale(Math.max(Math.abs(spin), 0.12) * (spin < 0 ? -1 : 1), 1);
  ctx.fillStyle = spin < 0 ? "#27a83b" : "#35c94a"; // darker "back side" while rotating
  ctx.strokeStyle = "#1e8f31";
  ctx.lineWidth = 3;
  ctx.lineJoin = "round";
  ctx.beginPath();
  ctx.moveTo(-7, -20); ctx.lineTo(7, -20); ctx.lineTo(7, 6);
  ctx.lineTo(15, 6); ctx.lineTo(0, 26); ctx.lineTo(-15, 6); ctx.lineTo(-7, 6);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

// ---------- input ----------
const ARROWS = new Set(["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"]);
const keys = new Set();
window.addEventListener("keydown", (e) => {
  if (e.code === "Space") {
    e.preventDefault();
    spawnGuy();
  } else if (ARROWS.has(e.code)) {
    e.preventDefault();
    keys.add(e.code);
  }
});
window.addEventListener("keyup", (e) => keys.delete(e.code));
window.addEventListener("blur", () => keys.clear());

window.addEventListener("contextmenu", (e) => {
  e.preventDefault();
  if (!guy || guy.state === "thrown" || guy.state === "bounce") return;
  stopTalking();
  guy.target = { x: e.clientX, y: e.clientY };
  guy.state = "walk";
  marker = { x: e.clientX, y: e.clientY };
});

hint.addEventListener("click", spawnGuy);

window.addEventListener("mousedown", (e) => {
  if (e.button === 0) interact(e.clientX, e.clientY);
});

// touch: first tap summons him; tap text to hear it; tap anywhere else to send him there
canvas.addEventListener(
  "touchstart",
  (e) => {
    e.preventDefault(); // no scroll/zoom, no synthetic mouse events
    const t = e.touches[0];
    const x = t.clientX, y = t.clientY;
    if (!guy) {
      spawnGuy();
      return;
    }
    if (LINES.some((l) => inRect(l.rect, x, y))) {
      interact(x, y);
      return;
    }
    if (guy.state !== "thrown" && guy.state !== "bounce") {
      stopTalking();
      guy.target = { x, y };
      guy.state = "walk";
      marker = { x, y };
    }
  },
  { passive: false }
);

window.addEventListener("mousemove", (e) => {
  const overLink = LINES.some((l) => l.link && inRect(l.linkRect, e.clientX, e.clientY));
  const overText = guy && LINES.some((l) => inRect(l.rect, e.clientX, e.clientY));
  document.body.style.cursor = overLink ? "pointer" : overText ? SPEAKER_CURSOR : "default";
});

const TALK_RANGE = 125; // how close he has to get before reading

function interact(x, y) {
  const linked = LINES.find((l) => l.link && inRect(l.linkRect, x, y));
  if (linked) {
    window.location.href = linked.link.url;
    return;
  }
  if (!guy) return; // speech only works once the sprite has been summoned
  const line = LINES.find((l) => inRect(l.rect, x, y));
  if (!line) return;
  pendingTalk = { x, y, line }; // walk over there first; update() starts the talking
}

function startTalking(spot) {
  if (talking) talking.audio.pause();
  talking = spot.line.voices[guy && guy.stache ? 1 : 0];
  talking.audio.currentTime = 0;
  talking.audio.play();
  if (guy) {
    // plop down facing the text he's reading
    if (Math.abs(spot.x - guy.x) > 2) guy.facing = spot.x > guy.x ? 1 : -1;
    guy.state = "idle";
    guy.idleT = 1;
    guy.target = null;
    marker = null;
  }
}

function stopTalking() {
  pendingTalk = null;
  if (!talking) return;
  talking.audio.pause();
  talking = null;
}

// ---------- main loop ----------
let last = performance.now();
function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;
  ctx.clearRect(0, 0, W, H);
  ctx.textAlign = "center";
  const ts = Math.min(1, W / 600); // shrink text on narrow (mobile) screens
  for (const line of LINES) {
    ctx.fillStyle = line.color;
    ctx.font = line.style + " " + Math.round(line.px * ts) + "px " + line.family;
    const by = H * 0.28 + line.dy * ts;
    const tw = ctx.measureText(line.text).width;
    line.rect = { x: W / 2 - tw / 2, y: by - line.ascent * ts, w: tw, h: line.height * ts };
    ctx.fillText(line.text, W / 2, by);
    if (line.link) {
      const prefixW = ctx.measureText(line.text.slice(0, line.text.indexOf(line.link.word))).width;
      const wordW = ctx.measureText(line.link.word).width;
      line.linkRect = { x: line.rect.x + prefixW, y: line.rect.y, w: wordW, h: line.rect.h };
    }
  }
  update(dt);
  const time = now / 1000;
  if (marker) drawMarker(marker, time);
  if (guy) drawGuy(guy, time);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
